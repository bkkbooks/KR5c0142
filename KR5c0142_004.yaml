front:
  text: 新雕洞靈真經卷第四
  hash: sha256:342c945e00d4228029d918a92b7d173404a8c4afd01c3957c4bdb2c3852ba0ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0142_SBCK_004-1a}
body:
  text: 亢倉子何粲注訓道篇第七至德之用萬教之主神明共贊可以化民閔子騫問仲尼道之與孝相去奚若疑其相去逺也仲尼曰道者自然之妙用孝者人道之至德窮於夲始謂之道施於人理謂之孝道能通生萬物不知其所由然故曰妙用孝者善事父母盡敬盡順通乎神明故曰至德夫其包運天地發育萬物曲成形布丕性壽性者剛柔之質壽者一期之盡其功至實而不為物府不為事官無為功尸捫求視聽莫得而有字之曰道雖曲成萬雕刻衆形尋求主宰莫見其眹故字之曰道道者靈通之謂用之於人字之曰孝孝者善事父母之名也夫善事父母敬順為夲意以承之順承顔色無所不至發一言舉一意不敢忘父母營一手措一足不敢忘父母事君不敢忘忠朋友不敢不信臨下不敢不敬嚮善不敢不勤雖居獨室之中亦不敢懈其誠此之謂全孝故孝誠之至通乎神明光于四海有感必應善事父母之所致也昔者虞舜其大孝矣庶母惑父屢憎害之舜心益恭懼而無怨謀使浚井下土實之于時天休震動神明駿赫導穴而出奉養滋謹由是玄德茂盛為天下君善事父母之所致也史記舜父瞽瞍與庶母弟各皆欲殺舜使舜修廪瞽瞍從下縱火焚廪舜乃以雨笠自扞而下去得不死後又使舜穿井舜穿井為匿孔旁出舜既入深瞽瞍與象共下土實井舜匿孔出去是其事也于時天以美之德震動舜心神明赫然令其免害及出之後事父弥謹堯知其聖歷試諸難後乃禪其位焉文王之為太子也其大老矣朝夕必至乎寢門之外問寺音侍人曰兹曰安否如何寺人奄宫主在左右侍君也曰安太子溫然喜色小不安節太子色憂滿容朝夕食上謂侍者進食於君太子必視寒暖之節食下必知善羞所進然後退知所食之多少寺人言疾太子肅冠而齊君有疾故太子嚴肅衣冠而齊齊者虛心專志以祈神明使救護耳膳宰之饌必敬視之湯液之貢必親嘗之饌飲食也貢進也嘗饌善謂君嘗饌也則太子亦能食嘗饌寡太子亦不能飽以至于復初然後亦復初君病間而太子亦復初君后有過怡聲以諷怡恱也謂下氣怡聲幾微諷諌君后所愛雖小物必嚴龔不敢慢君父之所愛是故孝成於身道洽天下雅曰文王陟降在帝左右雅詩大雅也陟升也帝天也左右助也言文王所為天必助之言文王靜作進退天必贊之故紂不能害贊佐也文王事紂為天所佐故殷紂雖不能輒害夢啓之壽禮記曰文王有疾旬有二曰乃間文王謂武王曰汝何夢矣武王對曰夢帝與我九齡文王曰汝以為何紂武王曰西方有九國君王其終撫諸文王曰非也我百尓九十吾與汝三焉文王九十七而終武王九十三而終丗三十年七百天所命也善事父母之所致也左傳曰成王定鼎于郟鄏世三十年七百天所命也閔子騫曰善事父母之道幸既聞矣敢問教子之義仲尼曰凡三王教子必視禮樂視猶示也樂所以修內和其心禮所以修外檢其容禮樂交修則德容發輝于貌故能溫恭而文明夫為人臣者殺其身有益於君則之况利其身以善其君乎是故擇建忠良貞正之士為之師傅欲知其父子君臣長幼之道夫知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人此三王教子之義也三王謂夏殷周三代之王也閔子騫退而事之於家三年人無間於父母兄弟之言上事父母下順兄弟盡善盡美故人無非間之言交遊稱其信鄉黨稱其仁宗族稱其悌德行之聲溢於天下此善事父母之所致也齊太子坐清臺之上燕莊一夲作壯侯他莊侯燕諡也他名也髙冠嚴色左帶玉具劒右帶環珮左光照右右光照左言玉珮之光交相照也太子讀書不視莊侯他問曰齊國有寶乎太子曰主信臣忠百姓戴上齊國之寶也莊侯他應聲解劒而去聞義而服也此章言君子尚信尚忠不尚華飾烏乎人有偏蔽身莫自知己矣賢者見之寬恕而不言小人愛而溢言親戚憐嫉而二言人有偏蔽惡乎不自知哉惡乎猶於何也是故君子檢身常有過衣其衣食其食知其過而不音克有以正之者君子恥之言為人臣不能有所匡正也將欲有言識其必不能行者君子罕言君不納忠諌則罕言以避患也當責衆人之惡者視已善乎哉當責衆人之邪者視已正乎哉此之謂返明先審身之善正然後責人之邪惡翟西氏之子甚孝謹翟西憐其子而好妄而之言翟西出夕返則曰甲死矣其子信之既而甲在焉他夕則曰乙且害余其子伺將行仇既而不見惡專他夕則曰丁病矣其子覘之丁誠無恙舉此也覘視也恙憂也舉皆也冒淹年序子固孝謹至於訓勒益不保承鄉國之人疾其咎口謀將殺之翟西聞而懼歸以告子子未甚信既而翟西見殺此章戒人輕言致害雖愛子猶不信之以至見殺况他人乎謂多言之人為踈露亦有辝約而不密者謂䡖佻之人為不定亦有體間而心躁者䡖佻猶䡖躁也謂叢雜之人為猥細亦有外潔而內濁者而引之不可殫載非徹識孰能究詳殫盡也有不可以應㕝也者內靜而外動其動而難靜謂外見利貪而逐之愈得愈貪故身勞而難靜時有不可求變也者內思而外待待至而後樂謂內興情欲緣境思求心有待得而後樂不知心搖而傷性是故外靜而內動者搖思而損性奔走而逐利者勞力而害名唯泊然無情欲人不為名利所誘者然後身安而性全也人生於代或有變不遂志而宣言云不遇時者是無異丹頸之罪俟時行戮豈不殆哉不能危行言遜于犯時君無異斬首之罪待時戮也丹血色也其有博才通識未見稱用者正可云時非不清命未與耳豈不韙歟韙是也長於諌者務依存前人之性而翦制其情之所由起是以彼此開進親敬殷篤不長於諌者務攻前人之性而暗於情之所來是以彼此嫌二猜舋日積兒童之所蕳者乃耆耋之所非耳目之所娛者乃心慮之所疾健責天下之愚者己之未賢也健責天下之迷者己之未明也賢明者當恕愚迷而勿責以未賢責衆愚未賢者以之亡以未明責衆迷未明者以之傷愚迷之人無所損健責者徒自傷耳新雕亢倉子卷第四
