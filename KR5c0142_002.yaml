front:
  text: 新雕洞靈真經卷第二
  hash: sha256:8714af5231ce3dd5078166e331c48558980dd8dcbcb41d33ca546ae2b21504f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0142_SBCK_002-1a}
body:
  text: 亢倉子何粲注政道篇第三順天行令不擇親踈異域同歸望風而靡人無法以知天以四時寒暑曰月星音辰之所行知天四時寒暑日月星之所行當則諸生血氣之皆得其處音處而安其産矣人臣亦無法以知主以主之賞罰爵祿之所加知主主之賞罰爵祿之所加冝則親踈逺近賢不肖者皆盡其力而以為用矣信全則天下安信失則天下危夫百姓勤勞則物殫盡則爭音害之心生而不相信矣人不相信由政德人事盈旱陽象陽主德陽為顯盛驕盈之君不修其德人事盈多則有大旱之災楚以為凡遭水干天子冝正刑修德百官冝去私戒盈則以而消百福日至矣楚亢倉子名也後皆放此鄭有胡之封圭戎弓胡國名封圭大圭也戎弓弓名也二物本胡國所有後為鄭所得異時失同於荆異時猶他時也諸侯殷猊曰荆楚之舊號也蓋時楚大諸侯共朝於楚為會同之期而後鄭至荆曰必得封圭戎弓不然臨兵于汝荆恃強大欲行非義因鄭後期脅二迫之將求二物鄭君病之駕見亢倉子曰封圭戎弓先君得之于胡綿代功寶傳章翼嗣病患也綿歷也翼嗣謂後嗣先君得此二物敬而藏之欲傳示子孫以為有功之寶今荆恃大而曰必得不然臨兵國危矣寡人欲以他封圭戎弓往之何他封圭别圭也亢倉子曰君其少安君少安勿懷懼今是楚亦有寶於此亢倉子以信義為寶飾楚之寶以貰罪於君楚所不能貰賖也偽以他圭欺誑大國取我誠信光飾而行雖罪可延賖終致後戮陷君於罪虧我信義故我不能為君必夫真鄭君勿以他圭往今荆以淺鮮之過而負其威刑申逞不直以耗音奪與國荆失諸侯於是乎在諸侯聞之嶈警一本作驚勸備倫比勤明會同上義固存鄭其為首君姑待之豈必非福淺鮮小貌也負恃也逞快也倫比猶等倫也姑且也鄭之失期實為小過荆恃強大欲肆威刑脅迫圭弓侵奪與國無德貪取必失諸侯矣於是以胡圭戎弓往未至郢郢荆所都荆人聞之聞亢倉子之謀曰彼用聖人之訓辭吾焉取此以不直於天下而令諸侯實生心焉遽返其賂而益善焉猶露也遽急也賂即鄭之圭弓也人之情欲生而惡死欲安而惡危欲榮而惡辱天下之人得其欲則樂樂則安不得其欲則苦苦則危人主放其欲則百吏庶音長具展其欲放謂放縱也百吏百官也庶長衆士之長展申也百吏庶長具展其欲則天下之人貧者竭其力冨者竭其財四人失其序士農工啇失其次序皆不得其欲矣天下之人不得其欲則相與持保抱逋逃隱蔽漂沝音流捃采以祈性命捃拾也采取也拾取野果求養性命吏又從而捕之是故不勝其危苦因有羣聚背叛之心生羣聚背叛之心生則國非其國也勿貪戶口百姓汝走多壯城池百姓汝疲賦斂不中窮者曰窮刑罰且二貴者曰貴科禁不行國則以傾中平也官吏非才則寬猛失所或與百姓爭利由是狡詐之心生所以百姓姦而難知天下難知則上人疑則下益惑下既惑則官長勞官長勞則賞不足勸刑不能禁易動而難靖此由官不得人故也政術至要力於審士力猶動也士有才行比於一鄉委之鄉士能和此一鄉則委一鄉之政以任之才行比於一縣委之縣才行比於一音州委之才行比於一國委之國政而後乃能無伏士矣各得展其才用則無隱伏之士矣人有惡戾於鄉者則誨之戾罪也人有罪折惡者則一鄉之長元教誨之不改是為惡戾於縣則撻之在鄉不改則送縣而撻之不改是為惡戾於國則誅之而後乃能無復逆節矣誠如是舉天下之人一一懷無有干背慆慢之萌矣此之謂靖人賢才獲用惡遷善則天下之人安靖也凡為大下之務莫大求士士之待求莫善通政通政之善莫靖人人主通逹政教則士歸之衆賢共理莫善於靖人矣靖人之才蓋以文章考之百不四五文章浮華矯而不實今以文章考核靖人之才百中無四五以言論考之十或一二有言者不必有德有德者不必有言故有中或有一二以神靖作態度考之十全八九賢良心廣躰胖神沖和動靜態度必合儀則審而察之十中得八九矣是皆賢王慶代明識裁擇所能爾也外雖有賢才而主無明識亦不能以裁擇天下王危代以文章取士則翦巧綺繿益至而正雅絮音素實益藏矣末丗文章尚於綺靡則雅素之士不來矣以言論取士浮掞遊飾益來而謇諤諍真益晦矣浮遊華飾之士貴則謇諤忠諍之才伏矣以神氣靖作態度取士則外正內邪益尊而清修明實益隱矣內無明識故任擇不得其人然者賢愈到政愈僻令愈勤人愈亂矣用非賢為賢乃益所以亂夫天下至大器也帝王至重位也得士則靖失士則亂故人主勞於求賢逸於任使於呼守天聚人者其胡可以不事誠於士乎人情失冝主所深恤失冝之大莫痛刑獄夫明逹之才將欲聽訟或誘之以詐或脅之以威或開之以情或苦之以戮雖作設權異而必也公平一物失冝明主之所深恤况刑嶽之大乎夫察獄問囚務得其實或有隱匿則設威以脅之開導之以實情或苦切之以刑戮雖變多端而終無枉濫也故使天下之人生無所於德死無所於怨理自當生故生無報德理自當死故死無怨怨夫秉國建吏持刑此可謂至官至官之代羣情和正諸産咸冝愛敬交深上下條固不可搖蕩有一家苟有違領一本作順凌逆安得動哉平王返正既宅天邑務求才良等聞一善簡音喜豫連日平王承幽厲之後天下板蕩無復紀綱於是撥亂返正東遷洛邑改革前非務求賢哲得聞日善纍日恱宅言也天邑即洛邑也等猶得也左右侍僕纍言大臣有賢異者如是踰歲侍僕左右小臣也見王恱喜承意阿謏王曰余一人于德不明務求賢異益恐山澤遺逸不舉豈樂聞善以自閉塞哉乃者仄媚僕臣纍譽權任頗階左右意余孱昧無能斷明徒唯和依違浸長自賢敗德莫此為多不時匡遏就兹固黨仄媚邪媚也任大臣也階升也孱弱也依違相依也雅媚小臣稱任階緣左古共相蔽謂我暗弱不能明察不遏絶黨固滋深於是棄左右近習三人市謂殺之而曝尸於市也古者刑人於市與衆共棄之貶庶司尹五人庶司尹長謂任大臣也曰無令臣君者附下罔上持祿阿意天下聞之稱為齊明海南之西歸者七國至理之代輿服純絮音素憲令寬簡禁網踈闊夫輿服純絮則人不勝羡不相企羡憲令寬簡則俗無忌諱禁網踈闊則易避難犯人不勝羡則嗜欲希微而服伇樂業矣服從也從於所伇之業也俗無忌諱則抑閉開舒而欣交通矣凡所抑閉皆由忌諱令既無忌諱皆得開舒也易避難犯則好惡分明而貴德知恥矣貴德則不犯知耻則易避夫服伇樂業之謂順欣交通之謂和貴德知恥之謂正浮墮之人不勝於順逆節之人不勝於和姦邪之人不勝於正順和正三者理國之宗也音衰末之代輿服文巧憲令禳祈禳祈煩多也禁網頗僻夫輿服文巧則流相炎慕俗尚文巧則下人隨流相企慕如火之上炎憲令禳祈則俗多忌諱禁網頗僻則莫知所逭逭猶逃也流相炎慕則人不忠潔而恥朴貴華矣俗多忌諱則情志不通而上下膠戾矣莫知所逭則讒禍乎果反繁興而衆不懼死矣夫恥朴貴華之謂浮上下膠戾之謂衆不懼死之謂冒真正之士不官於浮公直之士不官於器能之士不官於冒浮冒三者亂國之梯也荆君熊圉問水旱理亂熊荆之姓圉名亢倉子曰水旱由天理亂由人人事和理雖有水旱無能為害堯湯是也堯時九年洪水湯時七年大旱故周之秩官云人強勝天秩官周書篇也人事壞亂縱無水旱日益崩離且桀紂之滅豈惟水旱桀紂之君虐奢淫以滅亡非獨水旱也荆君北靣遵循稽首曰天不棄不榖及此言也遵循退行也荆君警重亢倉子故稱曰天不榖王公之卑稱也言亢倉子不棄於我故得及聞此言也乃以弘璧十朋為亢倉子壽拜為亞尹弘璧大璧也十朋十也亞尹小尹曰庶吾國有瘳乎亢倉子不得巳中宿微服違之他瘳差也違法也至理之代山無偽隱市無邪利朝無佞祿國産問何由得人俗醇朴國産鄭大夫孫喬字子産公亢倉子曰政煩苛則人姦偽法令滋彰盜賊多矣政省一則人醇朴其政悶悶其民醇醇夫人俗隨國政之方圎猶蠖屈之於葉也食黃則身黃食蒼則身蒼曰何為則人冨亢倉子曰賦斂以時官上清約則人冨斂無節官上奢縱則人貧勾粵之簳鏃以精金鷙隼為之羽以之棓箠則其與稿朴也無擇勾粵東粵也簳箭簳也鷙隼雕梟之也掊箠打擊也尓雅云東南之美者有會稽之箭焉勾夫粵之也以精金為鏃以隼領為羽用之打擊則同於稿朴無擇由無異及夫蕩冦爭音衝覿武決勝加之駭弩之士則三百步之外不立敵矣排蕩寇敵爭衝決勝如此勾粵之簳於強弩之則前無立敵矣蜚景之劒威奪白日氣盛紫霓以之刲穫則其與劂刃也無擇蜚景神劒也劂鐮也神劒雖利以之穫禾則同於鐮刃也及夫凶邪流毒沸渭不靖加之運掌之上則千里之內不留行矣凶邪流毒謂瘟疫之氣也此神劒能辟凶邪故威光所行則千里之內未嘗留止夫材有分而用有當所貴善因時而巳耳稿朴劂刃施用常用耳粵簳蜚景以禦凶災材分所當各因時而貴也劂音厥昔者明皇聖帝天下和平物茂暢羣性得極善因時而勿者也近古是來天下姦邪者衆正直者寡輕薄趨利者多敦方退靜者鮮姦者出言於忠言巧偽亂真不能辨也遂使天下之人交相疑害悲夫作法貴於易避而難犯救弊貴於省事而一令除去豪橫則官人安刑禁必行則官人不敢務私利官人不敢務私利而百姓冨史刑曰眚災肆赦赦不欲數赦數則惡者得計平人生心惡者得計務益於姦平人生心亦為不善而賢良否塞矣人有大為賊害官吏捕獲因廣條引誣陷貞良闊逺牽率兾推時序卒蒙赦宥遇賊害者訖無所快自毒而巳由是平人遞生計吏勞政酷莫能鎮止此由數赦之過也夫人之所以惡為無道不善者為其有罰也所以勉為有道行義者為其有賞也今無道不義者赦之而有道行義者妎音害而不賞欲人之就善也不亦難乎代有賢主秀士肯察此論訖猶終也快喜也毒也肯可也人怨者非不接人也神怒者非不事神也巧佞甚人愈怨淫祀盛神益怒洞靈真經卷第二
