front:
  text: 新雕洞靈眞經卷第二
  hash: sha256:5b77d8dd9f699da06d2334b41052ceef3390e24b66c6baf652ca7e645f4734bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0142_SBCK_002-1a}
body:
  text: 亢倉子何粲注政道篇第三順天行令不擇親踈異域同㱕望風而靡人无法以知天以四時寒暑曰月星音辰之所行知天四時寒暑日月星之所行當則諸生血氣之皆得其処音處而安其産矣人臣亦无法以知主以主之賞罰爵禄之所加知主主之賞罰爵禄之所加冝則親踈逺近賢不肖者皆盡其力而以為用矣信全則天下安信失則天下危夫百姓勤勞則物殫盡則爭音害之心生而不相信矣人不相信由政徳人事盈旱陽象陽主徳陽爲顯盛驕盈之君不脩其徳人事盈多則有大旱之災楚以爲凡遭水干天子冝正刑脩徳百官冝去私戒盈則以而消百福日至矣楚亢倉子名也後皆放此鄭有胡之封珪戎弓胡囯名封珪大珪也戎弓弓名也二物本胡囯所有後爲鄭所得異時失同於荆異時猶他時也諸侯殷猊曰荆楚之舊号也蓋時楚大諸侯共朝於楚為㑹同之期而後鄭至荆曰必得封珪戎弓不然臨兵于汝荆恃強大欲行非義因鄭後期脅二迫之將求二物鄭君病之駕見亢倉子曰封珪戎弓先君得之于胡綿代功寳傳章翼嗣病患也綿歷也翼嗣謂後嗣先君得此二物敬而藏之欲傳示子孫以爲有功之寳今荆恃大而曰必得不然臨兵國危矣寡人欲以他封珪戎弓往之何他封珪别珪也亢倉子曰君其少安君少安勿懷懼今是楚亦有寳於此亢倉子以信義爲寳飾楚之寳以貰罪於君楚所不能貰賖也僞以他珪欺誑大囯取我誠信光飾而行雖罪可延賖終致後戮䧟君於罪虧我信義故我不能爲君必夫眞鄭君勿以他珪往今荆以淺鮮之過而負其威刑申逞不直以耗音奪與國荆失諸侯於是乎在諸侯聞之嶈警一本作驚勸備倫比勤明㑹同上義固存鄭其爲首君姑待之豈必非福淺鮮小貌也負恃也逞快也倫比猶等倫也姑且也鄭之失期實爲小過荆恃強大欲肆威刑脅迫珪弓侵奪与囯无徳貪取必失諸侯矣於是以胡珪戎弓往未至郢郢荆所都荆人聞之聞亢倉子之謀曰彼用聖人之訓辭吾焉取此以不直於天下而令諸侯實生心焉遽返其賂而益善焉猶露也遽急也賂即鄭之珪弓也人之情欲生而惡死欲安而惡危欲榮而惡辱天下之人得其欲則樂樂則安不得其欲則苦苦則危人主放其欲則百吏庶音長具展其欲放謂放縱也百吏百官也庶長衆士之長展申也百吏庶長具展其欲則天下之人貧者竭其力冨者竭其財四人失其序士農工啇失其次序皆不得其欲矣天下之人不得其欲則相與持保抱逋逃隱蔽漂沝音流捃采以祈性命捃拾也采取也拾取野果求養性命吏又從而捕之是故不勝其危苦因有羣聚背叛之心生羣聚背叛之心生則國非其國也勿貪戸口百姓汝走多壯城池百姓汝疲賦歛不中窮者曰窮刑罰且貳貴者曰貴科禁不行國則以傾中平也官吏非才則寛猛失所或與百姓爭利由是狡詐之心生所以百姓姦而難知天下難知則上人疑則下益惑下旣惑則官長勞官長勞則賞不足勸刑不能禁易動而難靖此由官不得人故也政術至要力於審士力猶動也士有才行比於一郷委之郷士能和此一郷則委一郷之政以任之才行比於一縣委之縣才行比於一音州委之才行比於一國委之國政而後迺能无伏士矣各得展其才用則无隱伏之士矣人有惡戾於郷者則誨之戾罪也人有罪折惡者則一郷之長元教誨之不改是爲惡戾於縣則撻之在郷不改則送縣而撻之不改是爲惡戾於國則誅之而後迺能无復逆節矣誠如是舉天下之人一一懷无有干背慆慢之萌矣此之謂靖人賢才獲用惡迁善則天下之人安靖也凡爲大下之務莫大求士士之待求莫善通政通政之善莫靖人人主通逹政教則士㱕之衆䝨共理莫善於靖人矣靖人之才盖以文章考之百不四五文章浮華矯而不實今以文章考覈靖人之才百中无四五以言論考之十或一二有言者不必有德有德者不必有言故有中或有一二以神靖作態度考之十全八九賢良心廣躰胖神冲和動静態度必合儀則審而察之十中得八九矣是皆賢王慶代明識裁擇所能爾也外雖有賢才而主无明識亦不能以裁擇天下王危代以文章取士則翦巧綺繿益至而正雅絮音素實益藏矣末丗文章尚於綺靡則雅素之士不來矣以言論取士浮掞游飾益來而謇諤諍眞益晦矣浮游華飾之士貴則謇諤忠諍之才伏矣以神氣靖作態度取士則外正内邪益尊而清脩明實益隱矣内无明識故任擇不得其人然者賢愈到政愈僻令愈勤人愈亂矣用非賢為䝨乃益所以乱夫天下至大器也帝王至重位也得士則靖失士則亂故人主勞於求賢逸於任使於呼守天聚人者其胡可以不事誠於士乎人情失冝主所深恤失冝之大莫痛刑獄夫明逹之才將欲聽訟或誘之以詐或脅之以威或開之以情或苦之以戮雖作設權異而必也公平一物失冝明主之所深恤况刑嶽之大乎夫察獄問囚務得其實或有隱匿則設威以脅之開導之以實情或苦切之以刑戮雖変多端而終无枉滥也故使天下之人生无所於徳死无所於怨理自當生故生无報徳理自當死故死无怨怨夫秉國建吏持刑此可謂至官至官之代羣情和正諸産咸冝愛敬交深上下條固不可揺蕩有一家苟有違領一本作順凌逆安得動哉平王返正旣宅天邑務求才良等聞一善簡音喜豫連日平王承幽厲之後天下板蕩无復紀綱於是撥乱返正東遷洛邑改革前非務求賢哲得聞日善累日恱宅言也天邑即洛邑也等猶得也左右侍僕累言大臣有賢異者如是踰歳侍僕左右小臣也見王恱喜承意阿謏王曰余一人于徳不明務求賢異益恐山澤遺逸不舉豈樂聞善以自閉塞哉廼者仄媚僕臣累譽權任頗階左右意余孱昧无能断明徒唯和依違浸長自賢敗徳莫此爲多不時匡遏就兹固黨仄媚邪媚也任大臣也階升也孱弱也依違相依也雅媚小臣稱任階縁左古共相蔽謂我闇弱不能明察不遏絶黨固滋深於是弃左右近習三人市謂殺之而曝尸於市也古者刑人於市与衆共弃之貶庶司尹五人庶司尹長謂任大臣也曰無令臣君者附下罔上持禄阿意天下聞之稱爲齊明海南之西歸者七國至理之代輿服純絮音素憲令寛簡禁網踈闊夫輿服純絮則人不勝羡不相企羡憲令寛簡則俗无忌諱禁網踈闊則易避難犯人不勝羡則嗜欲希微而服伇樂業矣服從也從於所伇之業也俗无忌諱則抑閉開舒而欣交通矣凡所抑閉皆由忌諱令旣无忌諱皆得開舒也易避難犯則好惡分明而貴徳知恥矣貴徳則不犯知耻則易避夫服伇樂業之謂順欣交通之謂龢貴徳知恥之謂正浮墮之人不勝於順逆節之人不勝於龢姦邪之人不勝於正順龢正三者理國之宗也音衰末之代輿服文巧憲令禳祈禳祈煩多也禁網頗僻夫輿服文巧則流相炎慕俗尚文巧則下人隨流相企慕如火之上炎憲令禳祈則俗多忌諱禁網頗僻則莫知所逭逭猶逃也流相炎慕則人不忠㓗而恥樸貴華矣俗多忌諱則情志不通而上下膠戾矣莫知所逭則䜛旤乎果反繁興而衆不懼死矣夫恥樸貴華之謂浮上下膠戾之謂衆不懼死之謂冒真正之士不官於浮公直之士不官於器能之士不官於冒浮冒三者乱國之梯也荆君熊圉問水旱理乱熊荆之姓圉名亢倉子曰水旱由天理乱由人人事和理雖有水旱无能爲害堯湯是也堯時九年洪水湯時七年大旱故周之秩官云人強勝天秩官周書篇也人事壞乱縱无水旱日益崩離且桀紂之㓕豈惟水旱桀紂之君虐奢淫以滅亡非獨水旱也荆君北靣遵循稽首曰天不棄不榖及此言也遵循退行也荆君儆重亢倉子故稱曰天不榖王公之卑稱也言亢倉子不棄於我故得及聞此言也乃以弘璧十朋爲亢倉子壽拜爲亞尹弘璧大璧也十朋十也亞尹小尹曰庶吾囯有瘳乎亢倉子不得巳中宿微服違之他瘳差也違法也至理之代山无僞隱市无邪利朝无佞禄囯産問何由得人俗醇樸囯産鄭大夫孫喬字子産公亢倉子曰政煩苛則人姦僞法令滋彰盜賊多矣政省一則人醇樸其政悶悶其民醇醇夫人俗隨國政之方圎猶蠖屈之於葉也食黄則身黄食蒼則身蒼曰何爲則人冨亢倉子曰賦歛以時官上清約則人冨歛无節官上奢縦則人貧勾粤之簳鏃以精金鷙隼爲之羽以之棓箠則其與槁樸也无擇勾粤東粤也簳箭簳也鷙隼鵰鴞之也掊箠打擊也尓雅云東南之美者有㑹稽之箭焉勾夫粤之也以精金為鏃以隼領為羽用之打擊則同於槁樸无擇由无異及夫蕩冦爭音衝覿武决勝加之駭弩之士則三百歩之外不立敵矣排蕩寇敵爭衝决勝如此勾粤之簳於強弩之則前无立敵矣蜚景之劒威奪白日氣盛紫蜺以之刲穫則其與劂刃也无擇蜚景神劒也劂鐮也神劒雖利以之穫禾則同於鐮刃也及夫凶邪流毒沸渭不靖加之運掌之上則千里之内不留行矣凶邪流毒謂瘟疫之氣也此神劒能辟㐫邪故威光所行則千里之内未甞留止夫材有分而用有當所貴善因時而巳耳槁樸劂刃施用常用耳粤簳蜚景以禦凶災材分所當各因時而貴也劂音厥昔者明皇聖帝天下和平物茂暢羣性得極善因時而勿者也近古是來天下姦邪者衆正直者寡輕薄趨利者多敦方退靜者鮮姦者出言於忠言巧僞乱真不能辨也遂使天下之人交相疑害悲夫作法貴於易避而難犯救弊貴於省事而一令除去豪横則官人安刑禁必行則官人不敢務私利官人不敢務私利而百姓冨史刑曰眚災肆赦赦不欲數赦數則惡者得計平人生心惡者得計務益於姦平人生心亦爲不善而賢良否塞矣人有大爲賊害官吏捕獲因廣條引誣䧟貞良闊逺牽率兾推時序卒蒙赦宥遇賊害者訖无所快自毒而巳由是平人遞生計吏勞政酷莫能鎭止此由數赦之過也夫人之所以惡爲无道不善者爲其有罰也所以勉爲有道行義者爲其有賞也今无道不義者赦之而有道行義者妎音害而不賞欲人之就善也不亦難乎代有賢主秀士肯察此論訖猶終也快喜也毒也肯可也人怨者非不接人也神怒者非不事神也巧佞甚人愈怨淫祀盛神益怒洞靈眞經卷第二
