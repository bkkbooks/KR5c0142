front:
  text: 新雕洞靈眞經卷第一
  hash: sha256:0b8614128d6c6b59187eee6fb5a519848dee36a6b6c51282edbcba6db2629d2b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0142_SBCK_001-1a}
body:
  text: 亢倉子何粲注全道篇第一用道篇第二全道篇第一夫心虚極德洞玄微功並四時蒼生自化亢倉子居羽山之顔三年羽山尚書禹貢在徐州舜典云殛鯀于羽山蓋在東裔後屬魯國顔山之南靣也莊子引此章云北居㟪壘之山即此山是也俗無疵癘而仍榖熟聖賢所在天祐之福故俗無疵癘而五榖豐稔頻熟曰仍其俗竊相謂曰亢倉子之始來吾鮮然異之鮮然驚異之貌異其虚懷寂泊不存近情今吾曰計之不足歳計之有餘其或聖者邪驗其利益故疑之爲聖人盍相與尸而祝之古文社字而稷之乎盍何不也旣蒙厚利欲立爲君何不建置宗廟并及社稷尸榖祝南靣事之乎亢倉子聞之色有不釋其徒厭黒一本黯啜從而啓之黶啜亢倉子門人也欲也衆心故從而諮啓亢倉子曰吾聞至人尸居環堵之室而百姓猖狂不知其所如往至人心絶慮有於尸无事蕭然獨居環琽蒼生欣慕共往㱕依察其所㱕非由知者也今以羽俗父子竊竊焉將爼豆予我其的一本作杓之人邪竊竊私議之謂也我本栖隱全道任眞今乃爼豆相尊反成人之標的吾是以不釋於老聃之言老言我无爲而民自化我无事而民自足我好静而民自正今乃反此故不釋其言厭黒啜曰不者不者猶不然夫㝷常之汙巨魚无所還其體而鯢鰌音爲之制歩仞之丘巨獸无所隱其軀而㜸狐之祥八尺曰㝷倍㝷曰常汙池也還廻也鯢小魚而有脚制猶專擅也六尺曰歩七尺曰仞㜸祅也祥善也言小水而不能容巨魚小丘不能藏大獸喻亢倉子道德旣髙必須厚禄也旦也尊賢㕝音事能嚮善就利自堯舜以固然而况羽俗乎先生其聽矣亢倉子曰譆來譆歎聲也怪其不達已志故發譆歎將欲告之逺致故呼之曰來夫二子者知乎二子堯舜也知乎言豈知之函車之獸介而離山罔罟制之吞舟之魚蕩而失水螻蟻苦之故鳥獸居欲其髙魚鼈居欲其深夫全其形生之人藏其身也亦不厭深眇而已函盈也介也眇逺也吾語大亂之本祖乎堯舜之間其音終存乎千代之後必有人與相食者矣汝也夫事有先成後敗始吉終㐫胡可必邪故堯舜禪讓而光一時之美迹流後代成篡弑之禍故莊子云堯舜讓而帝之噲讓而絶湯武争而王白公争而滅斯其効欤夫唯不立善名者則事迹絶无所企慕耳言未終南子榮之樗色蹵然席曰樗秊運而長矣將奚以託業以古又斯言榮之樗莊子所謂南榮趎也旣聞髙義將欲蹵然變色歛於席願垂告示以敬事此言亢倉子曰全汝形抱汝生无使汝思慮營營此緒秊或可以及此言營營運動不息也緒終也全形抱生不運思慮虚心寂道自居之此終年可及此言也雖然吾才小不足以化子子胡不南謁吾師聃聃老子字亢倉子旣謝榮之樗不釋羽俗而龍巳乎天下謝猶遣也不釋羽俗潜遁而遊如龍變化与時升降水之性清土者抇胡骨反之故不得清人之性壽物者抇之故不得壽相乱也人性壽考爲外物所乱使不終天秊物也者所以養性也今代之惑者多以性養物則不知輕重也衣食養性不可一日而无而惑者乃損性以求物物愈積而性愈傷殊不知性重而物輕盖倒置之流也是故聖人之於聲色滋味也利於性則取之害於性則之此全性之道也萬人操弓音共射一招又音鵰招无不中萬物章章以害一生生无不傷葉也操持也招射的也章章猶故聖人之制萬物也全其天也聖人抑制万物不使傷性以全天真天全則神全矣神全之人不慮而通不謀而當精照无外志凝宇宙德天埅音地然上天子而不驕下匹夫而不惽此之謂全道之人神全之人智慮充溢精明照於无外志氣凝乎宇宙覆載之徳同乎天地雖貴爲天下賤爲匹夫不以窮逹而廻其志心平正不外物所誘曰清清而能乆則明明而能乆則虚虚則道全而居之秦佚死亢倉子哭之秦佚古之有道者盖老子之友也其伇曰天下皆死先生何哭也伇謂門人充使伇也死生之道古今是常達人躰之不可也亢倉子曰天下皆哭安得不哭順物不哭雖哭而非哭其伇曰哭者必哀而先生未始哀何也未始猶未甞也丗人之哭必生哀痛今先生雖哭不見悲傷敢問何故亢倉子曰舉天之下吾无與樂安所取哀夫有楽必有哀人之常情也逹人大豈有踈親旣不与爲楽亦无所取哀蛻地之謂水蛻水之謂氣蛻氣之謂虚蛻虚之謂道蛻者免脫之謂也夫脫地之謂水脫水之謂氣脫氣之謂虚脫虚之謂道猶至人不係情於哀楽然後爲極虚者道之體靖者道之埅理者道之綱識者道之目言至人能虚能静有理有識者則能契道之形躰知道之綱目道所以保神徳所以弘量禮所以齊儀物所以養體四者皆可以資身不可暫无好質白之物者以黒汙好質黒之物者以白汙吾又安知天下之正㓗汙哉由是不主物之㓗汙矣夫瞀視莫豆反者以黈偷厚反赤以蒼玄吾乃今所謂皁白安知識者不以赬黄吾又安知天下之正色哉由是不遁物之色矣瞀風眩也黈黄色也赬赤色也夫有風眩之疾者視物不能審也故以黄爲赤以青爲黒亦猶凢俗之情妄執㓗汙雖有大聖孰能正之故不主其㓗汙不流遁於衆色夫好貨甚者不見他物之可好好馬甚者不見他物之可好好書甚者不見他物之可好吾又安知天下之果可好者果可惡者哉由是不見物之可以保戀矣无能滑吾貞音真矣果决定也保猶懷也陳懷君桺使其大夫禱行聘於魯陳懷君謚桺名也禱陳大夫之名叔孫卿私曰叔孫謚丗為魯卿吾國有聖人若知之乎聖人謂仲尼陳大夫曰奚以果明其聖叔孫卿曰能廢心而用形聖境超殊非凡情所測徒見其應接丗務使證以為聖人豈知其所以聖哉陳大夫曰弊邑則小亦有聖人異於所聞曰聖人謂誰陳大夫曰有亢倉子者偏得老聃之道門人之中最為首故曰偏得其能用耳眎目聽定公聞而異焉使叔孫氏報聘且音致亢倉子待以上卿之禮亢倉子至賔于亞寢亞寢公之次殿魯公卑辭以問之亢倉子曰吾能聽眎不用耳目非能易耳目之所用告者過也公曰孰知是一本作就如是寡人増異矣其道何寡人果願聞之亢倉子曰我體合於心心合於氣氣合於神神合於无其有介然之有唯然之音雖逺際八荒之表迩在眉睫之内來干我者吾必盡知之乃不知是我七竅手足之所六腑五藏心慮之所知其自知而巳矣心形泯合神氣符洞然至忘与符同躰然後心弥静而智弥逺神愈黙而昭愈章理極而自通不思而玄覧非夫至聖至神其孰能与於此斯固靈真之要樞重玄之妙道也用道篇第二无非利物上荅天心刻巳㱕仁化行刑措天不可信埅不可信人不可信心不可信惟道可信賢主秀士豈知哉昔者桀信天與其祖四海巳不勤於道天奪其國以授殷紂亦信天與其祖四海巳不龔於道天奪其國以授周与猶以也祖猶主也夏桀殷紂躭躭淫奢縱自云有民有命禀在上天窮凶肆虐不脩其道故天奪其囯以授於湯武今夫墮音農信埅實生百榖不力於其道埅竊其菓稼而荒翳之墮農之人信地生榖不勤耕耘稂莠荒蕪故不能獲菓稼齊后信人之性酬讓不明於其道舉全境以付人人實鴟義而有其國后君也齊簡公也信人性不明酬譲為陳所弑人取其囯鴟義喻貪殘也凡人不脩其道隨其心而師之營欲茂滋災疾朋舋戕身損壽心斯害之矣人自師心不遵聖教營欲熾盛百殃斯集此乃心爲身害朋猶羣也舋動也戕害也故曰惟道可信道者坦蕩恬怡人所染著人能虚心㱕道則身命保全也天埅非道不能悠乆天得一以清地得一以寕蒼生非賢不能靖順庶政非才不能龢音和理賢才皆用道以理物夫用道之人不露其用福滋音萬物歸功无有潜功密濟百姓謂我自然神融業茂靈慶悠長融通也神理通逹徳業榮茂積善所鍾流後裔知而辯之謂之識知而不辯謂之道識以理人道以安人辯析事物使人去惡就善所以理人也含弘冲寂无所毀譽所以安鎮浮競也夫雞音晨而作日任勞流汗埅夜分僅息夫之道也雞晨謂雞鳴之旦也夜分中夜也日謂日所曝也僅少也俯拾仰取銳心錐撮力思搏精希求利潤賈豎之道也嚥氣谷神者亦静黙物固有似是而非似而是先號後始吉終凶身可親而才不可親才可敬而身不堪敬敬甚則不親親甚則不敬親之而踈踈之而親恩甚則怨生愛多則憎至有以速爲貴有以緩爲貴有以直爲貴有以音曲爲貴百事之冝其由甚微不可不知且故智者難之靖則神通窮則意通貴則語通冨則身通理勢使然同道者相愛同藝者相嫉同與者相愛同取者相嫉同病者相愛同壯者相嫉人情自然也情通无求則相愛争能尚勝則相嫉勢使然也多才而好謙貧賤而不謟處勞不爲辱冨貴而恭勤可謂有徳者也新雕亢倉子卷第一
