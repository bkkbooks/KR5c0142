front:
  text: 新雕洞靈眞經卷第三
  hash: sha256:a048f558889008d9ad539698da936d65cbaa3e36662bc0b86c4cf03cfa8a6975
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0142_SBCK_003-1a}
body:
  text: 元倉子何粲注君道篇第四臣道篇第五賢道篇第六君道篇第四清静无爲以身帥下始生之者天埅養成之者也萬物之始生者由乎天地助天地而養之者由乎人也能養天之所生而物攖之謂之天子攖擾也人能動天養物而物馴擾之者是謂天子昔舜有聖德三徙成都是也天子之動也以全天氣故此官之所以自立也立官者以全生也天不自理故聖人代天以理物者也聖人不能猶理故立官以輔之立官之由本以養物貴全天氣不使有傷今代之惑主多官而反以害生則失所以爲立之夲矣後代惑主務在多官官多則政煩政煩則害物是失立官之夲意也草鬱則爲腐樹鬱則爲蠧人鬱則爲病國鬱則百慝並起危亂不禁鬱者氣擁不通之謂也官多政煩事有擁滯如草木之成腐蠧也所謂國鬱者主德不下宣人欲不上逹也姦臣蒙蔽故主德不軍宣庶枉屈故人欲不上逹是故聖王貴忠臣正士爲其敢直言而决鬱塞也剋已復禮賢良自至剋損也復返也人君能以謙損返禮則賢良歸己君耕后古字蒼生自化天子親耕皇后親以身率人則天下化由是言之賢良正可待不可求求得非賢也君有賢讓賢臣自歸故可待也君無禮讓雖復求賢賢至乃非賢也蒼生正可化不可刑刑行非理也君耕后人自効之故可化也身不自爲而使人爲之必不從雖復刑之刑行非至理堯舜有爲人主之勤无爲人主之欲天下各得濟其欲勤謂勞心以養物欲謂私身以奉己也有爲人主之位无爲人主之心故天下各得肆其心位謂居位而理事心謂求安以自適肆者申也士有天下人愛之而主不愛者有主獨愛之而天下人不愛者竭公忠而養天下則天下愛之徇私情而媚一人則其主愛之用天下人愛者則天下安用主獨愛者則天下危人主安可以自放其愛憎哉由是重天下者當制其情聖人以天下爲安危者欲天下之安則人主不得縦其愛憎當抑制其私情所謂天下者謂其有萬物也所謂國者謂其有人衆也夫國以人爲夲人安則國安故憂國之主務求理人之術天下以萬物爲多邦國以人衆爲富憂國家者不可不任賢以輔己也玉之所以難辨者謂其有怪石也金之所以難辨者謂其有鍮石也怪石似玉鍮石似金猶姦人外正内邪亦難辨也今大以隼翼而之鷃視不明者正以爲隼明者視之乃鷃也隼鷂鷃雀今夫小人多誦經籍方書或學竒技通而以青紫章服使愚者聽而視之正爲君子明者聽而視之乃小人也竒技異藝也通也故人主誠明以言取人理也以才取人理也以行取人理也人主不明以言取人亂也以才取人亂也以行取人亂也人主明者以言行取人尽皆理也主昏昧雖以言行取人盡皆亂也夫聖王之用人也貴耳不聞之功目不見之功口不可道之功而百姓暢然自理矣夫賢良之理丗也不顯其名不彰其用不其能潜功密濟理自玄暢名迹不生人无企尚故聖王貴之也人主貴耳聞之功則天下之人運貨逐利而市譽矣人主貴聞臣下之功則姦人運其財貨隨逐便利以市声譽貴目見之功則天下之人恢形異㙯而争進矣恢誕形容竒異藝夸企争進愈乱天下矣貴可道之功則天下之人習舌調吻而飾辭矣利口便辨虚而不實使天下之人市譽争進飾辭見達者政敗矣争名尚能則政理之道衰人主皆知鏡之明己也而惡士之明己也鏡之明己也功細士之明己也功大知其細失其大不知矣鏡知形之好醜士知心之善惡正形之功細正心之功大今人主乃貴其細其失其大豈不惑哉於呼人主清心省㕝音事人臣恭儉守職太平立致矣而代或難之吾所不知也人主方寸之地不明不斷則天地之冝四海之内動植萬咸失其道矣方寸之地謂心所居也動謂含氣之植謂草木之以耳目取人者官多而政亂取聞見之功則飾僞者衆爭進者多主不能辨故官多而政乱矣以心慮取人者官小而政清用心慮神識而得人者其官甚寡其政甚理是知循理之代務求不可見不可聞之材澆危之代務取可聞可見之材嗚呼人主豈知哉以耳目取人人皆上禳下奪以買譽以心慮取人人皆静正以勤德吏静正以勤德則不言而自化吏以買譽則刑之而不音畏代主豈不知哉臣道篇第五盡忠竭力謀効所同夫國之將興也朝廷百吏或短或長或醜或美或怡或厲或是或非醜惡也怡恱也厲嚴厲也雖聽其言觀其貌有似不同然察其志徴其心盡於爲國所以剛訐不怨黜退不愕議得其中无違乎理故天不惑其時埅不乏其利人不亂其㕝音神開賛蠻夷柔同保合太和萬物化育國之興也朝廷䘵位務盡其忠各竭其能力行行公正无有阿私故天時不惑地利不乏人事事不乱神祐助逺方柔服國之將亡也朝廷百吏姿貌多美顔色諧和詞氣華柔動止詳潤亡囯之臣外雖和順内懷猜忌各徇其弘闇相害雖觀其貌聽其言有歡洽然察其志徴其心盡在競位所以聞竒則怪見異必愕狙嫉相蒙遂䘮其道故天告災時埅生反物天反時爲災地反物爲妹人作凶徳神間旤間猶伺也戎狄交侵䘮亂弘多萬物不化夫不傷貨財不妎人力不損官吏而功成政立下阜百姓上滋主徳如此者忠賢之臣也費財煩人危官苟致一時功利規賞於主不顧過後貽災於國如此者姦臣也至理之代官得人不理之代人得官邾龍客閑又又音慳問事君亢倉子曰旣榮死而臣人者也心莫公無阿私也貌莫和言莫正公不欲露和不欲正不欲犯君不見察亦不欲犯顔而諌也古之清勤爲國脩政今之清勤爲身脩名夫爲國脩政者區処條别動得其冝合於大體爲身脩名者區処條別致逺不通拘於小節是知心以道爲主抵物得其所心以事爲主抵物失其所以道爲主公心也以事爲主私情也抵者觸也臣居上位不諌下位不公不合贍其禄贍賙給也君不嚴敬大臣不彰信小臣不合官其朝有才者不必忠忠者不必有才臣不患不忠適恐盡忠而主莫之信主不患不信適恐信之而莫能事事事事猶用事也上等之人得其性則天下理中等之人得其性則天下亂明主用上等之人當委以權冝便㕝四其所爲上等之人謂賢良也公平正直无所阿私使之莅職信能臣賛雖変有時必㱕於正也用中等之人則當程課其功示以賞罰中等之人謂藝能之士見善則遷見惡則染故人君賞罰制之賢道篇第六刻己復礼賢良自至賢良所以屢求而不至難進而易退者非爲愛身而不死王事適恐盡忠而主莫之信耳自知有材識之人外恭謹而内無憂其於衆也龢正而不狎親之則彌莊踈之則退去而不怨窮厄則以命自寛榮逹則以道自止人有視其儀賢也聽其聲賢徴神課識或所望夫賢人其見用也入則諷譽出則龔黙職司勤辨居室儉閑諷謂刻君之過譽謂稱君之美龔黙静慎也辨理也閑謂防閑其未見用也藏身於終藏識於目藏言於口飽食安歩獨善其善貞而不怨智者不疑㕝識者不疑人有識之士行危而色不可踈言遜而理不可拔謂過濁丗不變其志行雖危而色常和言雖遜而理確然凢謂賢人不自稱賢自伐者無功故非賢也效在官一夲效在官天功在事事驗其官政察其用事即賢不肖可辨也太平之時上士運其識中士竭其耐音能小人輸其力齊有掊子者材可以振國行可以獨立振濟也猶立謂德行摽不可傾㧞㕝父母孝謹郷黨恭循念居貧無以爲養施信義而遊者乆之矣所如寡合或爲乗時夸毗者所給如往也寡合少諧偶也夸毗謂矜恃也也給欺也於是杖歩足問乎亢倉子曰吾聞音至人忘情至人虚懷與道合躰故忘情也人不事情衆人智力愚昧不能用情也存情之曹務其教訓而尊信義曹輩也中人存情情以信義爲尊吾乃今不知爲工工猶能也躬行信義所往寡合不知其所爲能受不信爲信丗有受人之不信將以爲信也信而不見信爲有實爲信而不爲人所見信乃自以爲信也爲勤慕義爲義人有夲非義而以慕義爲義乃爲人所稱義也義而不俟義爲義有實爲義而不待人稱義亦常自爲義也然則信義之士常獨厄隨退胡以取貴乎時而教理之所上也亢倉子俯而循衽仰而譆超然歌衽衣襟也譆歎声也超然髙舉之貌曰時之陽兮信義時之陽喻君有道也君有道則信義昌盛時之黙兮信義伏時之黙喻君暗昧也君暗昧則信義伏藏陽與黙昌與伏汩吾無誰私兮羌忽不知其讀汨乱也羌發声也讀云也夫時有理乱故用有行藏陽則与時俱昌黙則与時俱伏隨流任運寕有私邪今乃問我故我不知其云也夫運正性以如適而物莫之應者眞不行也眞且不行謂之道喪信義者正性之用也眞者正性之夲也道喪之時上士乃隱隱之爲義有可音爲也時有可爲莫可者也時有否㤗莫得長爲有可用也有時而用莫可用者也用有行藏莫得長用祭公問賢材何從而不至亢倉子曰賢正可待不可求材愼在求不愼無材在求而擇之不愼无材天子静大臣明刑不避貴澤不隔下則賢人自至而求用矣賢人用則四海之内明目而眎清耳而聽坦心而無鬱矣天自成地自寧萬物醇化神不能靈天下醇和故神不能見靈恠故曰賢正可待不可求天子勤明大臣和理之求士也則恢方大公直靖人之才至天子苛察大臣躁之求士也則心巧應毀方破道之才至天子疑忌大臣巧隨之求士也則竒姓異名仄媚怪術之才至若天子自賢大臣固位之求士也則事文逐譽貪濁浮麗之才至天子依違大臣回佞之求士也則外忠内僻情毒言和之才至故曰才愼在求不愼无昔者黄帝得常仙封鴻容丘二人黄帝臣也啇王得伊尹中興得甫申中興周宣王也甫仲山甫申申伯也齊桓得寗籍即寗戚也皆由數君體道滿志之謂材賢可以鎭國材可以理國所謂鎭者龢寕无爲人不知其力至德潜化者人莫能知之所謂理者勤率其事人知所於德人頼其功故推德於己一賢統衆材則有餘衆材度一賢猶不足如是賢材之殊域一賢雖少統領衆材尚有餘德衆材雖多比度一賢猶不能及有居山林而諠者有在人俗而静者有諠而正者有静而邪者言求賢不可不察其邪正矣凡眎察其貌鄙俗而能有賢者不一眎察其貌端雅而實小人者十而九言賢人難得也夫不練其言而知其文不責其儀而審其度不采其譽而知其善不流其毀而斷其實可謂有識者也不待流言毀謗而知其惡情也新雕洞靈眞經卷第三
