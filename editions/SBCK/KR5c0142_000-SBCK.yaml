front:
  text: 全道且也尊賢使能旦字悞禮所以齊儀今夲
  hash: sha256:9bcf90e3a307c306a1322713bd0604548cdef406869e3dff4ded8dcf1967d044
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0142_SBCK_000-1a}
body:
  text: 儀作物用道似非而是似下脫非字政道藉爲人君若字悞人事盈作盈悞窮者日窮曰字悞科禁不行今夲作科禁大行寛猛失所冝或字悞天下王危代今夲作王天下者若絮字作守天聚人今本天作圀事誠於士今本誠作試簡豫簡作賦歛無節歛上脫賦字駭弩之上士字悞近古㠯来是字悞貞於忠言貞今夲作等君道養成之者人也脫人字賢道信而不見信爲信脫下信字不愼無愼字悞訓道布丕今夲作不希兹日安否曰字悞好躁妄之言悞作妄而之言孰能究詳今本作安能洞詳農道人忘夲而事末人末夲末字悞好智下脫好智二字右得金城黄諫刻夲校對
  hash: sha256:3a93efcf7a35092fd9756a2dae75d5716abaf36cd6454f49fc91086c05064c75
