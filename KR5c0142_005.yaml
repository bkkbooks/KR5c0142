front:
  text: 新雕洞靈真經卷第五
  hash: sha256:05b4ca1c5a0f2f1362c66faea81022ff7328d305c5d0ae307aabdf55221bff6b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0142_SBCK_005-1a}
body:
  text: 亢倉子何粲注農道篇第八兵道篇第九農道篇第八夫榖者人之天理國之道務農為夲人捨夲而㕝末則不一令夲謂農也末謂趍浮利也人趍未利則姦詐多端故一令不能制也不一令則不可以守不可以戰趍利多端人心不一固不可以固守不可以攻戰人捨夲而變末則亣産約人貪浮利則産業薄亣古其字亣産約則輕流徙輕流徙則國家時有災患皆生逺志無復居心人末夲而變末則好智則多詐多詐則巧法令巧法令則以是為非以非為是古先聖王之所以理人者先務人非徒為埅也貴其志也志在安人人則朴朴則易用易用則邊境安安則王位尊人則童如童兒無異志童則少私義少私義則公法立力博深則亣産復猶厚也亣産復則重流散不流散也重流散則死亣處無二慮是天下一心矣天下一心軒皇几音蘧之理不足過也軒皇几蘧古之有道之君古先聖王之所以茂耕織者以為夲教也是故天子躬率諸侯耕籍田大夫士第有功級勸人尊埅産也第次第也月令云正月中氣天子乃擇元辰親載耒耜置之車右率公卿諸侯大夫躬耕籍田天子三推公五推卿諸侯九推是以功級人也后妃率嬪御一作又作蠶於郊桑公田勸人力婦教也月令云三月中氣命有司無伐桑柘乃修蠶器后妃齋戒享先蠶而躬桑以蠶事器云古者天子諸侯各有公桑蠶室近川而為之君上三宫之大夫世婦之吉者使入蠶於蠶室世婦卒蠶奉繭以示乎君遂獻于夫人夫人繅三盆手遂布于三宫夫人世婦之吉者使繅之此勸婦教也男子不織而衣婦人不耕而食男女貿功資相業此聖王之制也貿易也故敬峕愛日埒實課功埒量也非老不休非疾不息一人勤之十人食之上農夫食十人當時之務不興土功不料師旅男不出御女不外嫁以方農興土功理師旅行婚嫁皆謂方農業也御迎也謂男子不親御黃帝曰四峕之不正正五榖而巳耳夫稼之者人也稼種也生之者天也養之者墬也是以稼之容足耨之容耰耨鋤也耰謂鋤器也耘之容手耘除草也是謂耕道種苗可使容足耨之可使容耰耘之可使容手農攻食工攻器賈攻貨攻理也時叓不龔之以土功是謂大君王不恭農事而其時以興土功則大凶之道也凡稼蚤者先峕暮者不及時寒暑不節稼乃生災謂大早大晚者不得中和之氣冬至巳後五旬七日而昌生旬十日也五十七日在立春節中而草木昌於是呼始耕叓農之道見生而藝生見而穫死因天時而興民利也藝種也穫刈也發峕埅産財不與人昋音期有年祀土無年祀土有年豐年也無年荒年也禮土社稷也春祈豐年也秋報成熟不以有年則無年不所以祈地利重人命無失人峕逮時而作過峕而止老弱之力可盡起逮及也雖老弱可使盡耕所以趍使也不知峕者來至而逆之謂興農大早既往而慕之時既過往而慕之是大晚當其峕而薄之雖當其時而用功寡薄所亦不多此從叓之下也此三者雖從農務不得其時故云下也人耨必以旱埅肥而土緩夫鋤必用旱峕旱時則草易死而土脈肥緩稼欲産於上而殖於堅者殖長也下種欲其土細如塵則地虛而根深及苗深長也得雨則土堅土堅則莖固也愼其種勿數無岑踈數謂煩密於其施土無不足無有餘於土謂施利於土也種不足則傷踈而費地于有餘則傷密而損谷不費不損取其中也甽欲深以專畝欲沃以專正直也畝深直則水流疾畝沃平則潤澤均下得侌上得昜後盛生下隂謂水潤上陽謂日氣盛咸生也吾苗有行故速強弱不相故速大苗成行則長疾強不害弱則易大正其行通亦當作丌中疏為冷凮凮古風字使苗疏而通風有而多功率稼望之有餘就之疏是埅之也由地瘠薄也苗不茂盛被之狀不除蕪除之虛是叓之傷也除理也草盛而後除之苗則虗矣是人事傷之苗其弱也欲欲一一生不併聚也其也欲相與居與衆共相蔭映其熟也欲相扶無倒折之害三以族稼乃多榖三者如人之宗族共相扶持則多也凡苗之害不俱生而俱生不齊則不茂矣是以先生者美米後生者為粃強者凌弱故後生者不實是故其耨也其兄而去其弟以人喻苗先後兄弟樹肥無扶踈樹墝不欲專生而居墝也專生獨居不奈夙旱也肥而扶踈多粃墝而居多死不知耨者去其兄而養其弟不其而其粃上下不安則稼多死得時之禾長稠當作而大穗圜而薄粳米而香舂而易而食之強禾粟也稠穗鵛也圜圎也甘味也失峕之禾深芒而小莖穗鋭多粃而青蘦深芒長芒也鋭細也青蘦米青也得峕之黍穗不芒以長搏米而寡粳搏米謂以手挼榖而出米也失峕之黍大本莖葉膏短穗本根也華莖莖傍有花名膏肥大也得峕之稻莖葆長秱穗如馬尾葆大也馬尾言長也失峕之稻纎莖而不滋厚粳而災得峕之麻踈節而色陽堅枲而小本陽光也堅牢也言皮堅徑也失峕之麻蕃柯短莖岸節而葉蟲蕃柯枝柯多也岸節言節髙也得峕之菽莖而短長其莢二七以族多枝數節競葉繁實稱之重食之息菽豆也族聚也息猶盈也失峕之菽以長而蔓浮葉虗本踈節而小莢得峕之麥長秱而頸族二七以行薄翼而𪏆色𪏆吐見切薄翼粳也𪏆黃色也食之使人肥且有力失峕之麥胕腫多病弱苗而翜穗胕腫謂根莖粗而且蟲翜穗多芒也是故得峕之稼豐失峕之稼約庶榖盡從而食之人四衛變強耳目聰明氣不入身無苛殃善呼孔生之言冬飽則身溫夏飽則身涼夫溫涼峕適人無病音疹人無病是疫癘不行疫癘不行咸得遂其天年故曰榖者人之天是以興王務農王不務農是棄人也王而棄人將何圀本從口或聲古作唐武后作圀俗作國哉兵道篇第九兵者不祥之器不得已而用之秦景王視強兵於下秦時肴函險固兵強士勇故視強兵於天下使天下無敢與之敵視猶示也庶鮑戎必命亢倉子庶長秦爵號鮑戎人姓名待以壤邑十二周實迫之周密也欲問亢倉子之計故以十二邑待之恐其不來密使鮑戎迫之使必來亢倉子至自榮泉賔於上館榮泉秦地名景主三日弗得所問欲問之而弗得下席北首頓圭曰天果無意恤耶北首頓圭盡禮而已亢倉子油盻曰朕以主異之問而寧弊弊焉以斫刺故油然微動貌側也盻顧也朕我也以景主有逺異之問而何謂弊弊焉言景主以兵戈斫刺為故乎言其所問下也抑者隨其所而得正者無如可矣言景主既以兵道問我故我抑亦隨其所欲而正之非至理之可也景主一拜再舉斂黼袵端圭抑首而坐曰實惟所命黼袵繡襟也抑者低首也惟天所命垂告命也亢倉子仰榱而俯正顔色曰原兵之所起與始有人俱榱椽也噓嘆也嗟其不問至道故仰面而嘆夫兵之所起與人俱生本始有之非獨今也夫兵也者出人之威也人之有威性受於人有喜怒之性本受于天怒則威生威生則兵起之由也故兵之所自來上矣嘗無少選之不用少選猶少時也喜怒之情用之無常故無少時不用也貴賤長少賢愚相與察同同察怒無人動則知兵起之原也兵之兆在心懷恚而未兵也疾視作色兵也傲言推捘兵也捘子寸反侈鬪攻兵也此四者鴻細之爭也恚怒也作色厲色也捘亦推也謂相推蕩也四者雖有大小之異皆有怒心故為兵也未有尤之峕人實揭材木以鬪矣尤黃帝時諸侯兄弟八十一人銅頭鐵額與黃帝於鹿之野始造兵器為黃帝所滅黃帝用水火矣或引水注邑或縱火燒城共工稱矣共工與顓頊爭天下五帝相與爭矣一興一廢勝者用叓用兵之道有廢有興皆以順天而勝者得用矣夫有以用藥而者欲禁天下之醫非也有以舟而者欲禁天下之非也有以用兵而喪其圀者欲禁天下之兵非也夫兵之不可廢譬水火焉善用之福不善用之禍是故怒笞不可偃於家刑罰不可偃于圀征伐不可偃于下笞鞭杖也偃息也古之聖王有義兵而無偃兵義兵者順天應人所以諌暴亂也兵誠義以誅暴君而振若人人之恱本折字奏刻石文作俗作也若子之見慈親餓之遇美食號呼而若強弩之射深谷振救也僕也強弩之射深谷言投赴疾也勝之決勿徴於他必反人情人之情欲而惡欲榮而惡辱死榮辱之道一三軍之士可一心矣人君與三軍之士同其生榮辱則三軍雖衆可使一心矣凡軍欲其衆也心欲其一三軍一心令可使無敵人古之至兵蓋重令古之至極善用兵者蓋重慎其令也故其令強者其敵弱其令信者其敵詘先勝之于此勝之與彼夫料敵制勝必先自料若與衆同生而三軍一心則勝矣誠若此則敵胡足勝也凡敵人之來也以求利也今來而得且以走為利則創無所與接矣此之謂至兵傲虐姦詐之與義理反也言姦兵與義兵逆順之理相反其不俱勝不相立義兵勝姦兵敗故義兵入於敵之境則人知所庇矣兵至于圀邑之郊不踐果稼不穴丘墓不殘積聚不焚室屋得人虜垕而歸之但與人期以敵資以章好惡以示逆順若此而猶有愎狠凌宕不者雖行武焉可也愎狠猶戾也宕流宕也先行義以示之猶有戾不聽服者雖用武諌可也先發聲出號令曰兵之來也以除人之讎以順之道故尅其圀不屠其人誅所誅而已獨誅者誅暴君也於是舉選秀士賢良而尊古折字俗作封之求見疾長老而拯敬之疾之人拯給之長老者致敬也府庫之財散倉之秩文曰積也毛氏曰以禾形從失聲也本再生稻借為秩序字不私其物曲加其禮不私其利與衆共之曲加其禮聘以求賢也今有人於此能以上象草出土上也人人下當有生字一人下之人爭叓之矣生猶活也言有人以義活一人之則天下咸事之義兵之一人亦多矣人孰不恱故義兵至鄰之人歸之㳅水諸國之人望之如父母行埊滋逺得人滋衆辭未終景主興起抑首而坐至是坐而起立舉首也曰聞先生教言不覺氣盈宇宙志知所如也而心滋益龔既聞義兵之道鄙其姦傲之心故志氣盈滿充塞宇宙志知所如也於是步前稱觴為亢倉子壽舉步前進觴飾重道也拜居列師位嚴于齋室又月涉旬辰加天白晝行道天即天岡謂辰時也行道行弟子禮也洞靈真經卷第五音義全道一社折至折為㕝事夂音終折後抇胡骨反折共埅墬地折為折玄貞真不致至用道二農和和折萬折晨專端塞折克折曲政道三辰處處折長沝流折州蕳喜
